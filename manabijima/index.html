<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
  <title>くまのまなびじま ｜ 2〜6さいの知育アプリ</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <meta name="description" content="くまのまなびじま — 2〜6歳向けの知育アプリ。ひらがな・かず・abc・いろ・かたちを、クマと一緒に楽しく学べます。ブラウザでそのまま遊べます。">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: linear-gradient(160deg, #fdeccb 0%, #ffd9a8 45%, #ffc6dd 100%);
      font-family: "Hiragino Maru Gothic ProN", "Yu Gothic UI", "Segoe UI", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    #stage {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    /* ポートレート(9:16)を画面にフィット。縦基準で最大化 */
    #frame {
      position: relative;
      height: 100vh; aspect-ratio: 9 / 16;
      max-width: 100vw;
      background: #000; overflow: hidden;
      box-shadow: 0 12px 48px rgba(120,70,20,.35);
    }
    @media (min-aspect-ratio: 9/16) { #frame { height: 100vh; width: auto; } }
    @media (max-aspect-ratio: 9/16) { #frame { width: 100vw; height: auto; aspect-ratio: 9/16; } }
    #unity-canvas { width: 100%; height: 100%; display: block; background: #1a1216; }
    /* ローディング */
    #loading {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #fdeccb 0%, #ffd9a8 50%, #ffc6dd 100%);
      transition: opacity .5s ease; gap: 22px;
    }
    #loading.hide { opacity: 0; pointer-events: none; }
    .bear { font-size: 84px; animation: bob 1.4s ease-in-out infinite; }
    @keyframes bob { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-14px) rotate(4deg)} }
    .title { font-size: 26px; font-weight: 800; color: #8a4b1e; letter-spacing: 1px; }
    .sub { font-size: 14px; color: #b07b46; margin-top: -10px; }
    #bar { width: 64%; max-width: 260px; height: 14px; border-radius: 99px; background: #ffffffaa; overflow: hidden; box-shadow: inset 0 1px 3px #0002; }
    #bar > i { display:block; height:100%; width:0%; border-radius:99px; background: linear-gradient(90deg,#ff9a3c,#ff5fa2); transition: width .2s; }
    .pct { font-size: 13px; color:#a05a28; font-weight:700; }
    #rotate-hint { display:none; }
  </style>
</head>
<body>
  <div id="stage">
    <div id="frame">
      <canvas id="unity-canvas" width="1080" height="1920" tabindex="-1"></canvas>
      <div id="loading">
        <div class="bear">🐻</div>
        <div class="title">くまのまなびじま</div>
        <div class="sub">2〜6さいの ちいくアプリ</div>
        <div id="bar"><i id="bar-full"></i></div>
        <div class="pct" id="pct">よみこみちゅう… 0%</div>
      </div>
    </div>
  </div>
  <script>
    var canvas = document.querySelector("#unity-canvas");
    function unityShowBanner(msg, type){ if(type==='error') console.error(msg); else console.warn(msg); }
    var buildUrl = "Build";
    var config = {
      arguments: [],
      dataUrl: buildUrl + "/WebGL.data",
      frameworkUrl: buildUrl + "/WebGL.framework.js",
      codeUrl: buildUrl + "/WebGL.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "BurningAlpha",
      productName: "くまのまなびじま",
      productVersion: "1.0",
      showBanner: unityShowBanner,
    };
    var loading = document.getElementById("loading");
    var barFull = document.getElementById("bar-full");
    var pct = document.getElementById("pct");
    var script = document.createElement("script");
    script.src = buildUrl + "/WebGL.loader.js";
    script.onload = function(){
      createUnityInstance(canvas, config, function(progress){
        var p = Math.round(progress*100);
        barFull.style.width = p + "%";
        pct.textContent = "よみこみちゅう… " + p + "%";
      }).then(function(){
        loading.classList.add("hide");
        setTimeout(function(){ loading.style.display="none"; }, 600);
      }).catch(function(message){
        pct.textContent = "よみこみエラー…ページを さいよみこみしてね";
        console.error(message);
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
