<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>受託KPI ｜ BURNING BROS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#15171c;color:#e8e8ea;font-family:"Hiragino Maru Gothic ProN","Yu Gothic UI",sans-serif;padding:14px;max-width:560px;margin:0 auto}
h1{font-size:20px;margin-bottom:4px}.sub{color:#9aa;font-size:12px;margin-bottom:14px}
.total{display:flex;gap:10px;margin-bottom:16px}.total>div{flex:1;background:linear-gradient(135deg,#1e2530,#252b38);border:1px solid #3a4250;border-radius:14px;padding:14px;text-align:center}
.total b{display:block;font-size:26px;margin-top:4px}.total .c{color:#51cf66}.total .e{color:#ffd43b}
.plat{background:#1c1f27;border:1px solid #2c3240;border-radius:14px;padding:14px 16px;margin-bottom:12px}
.plat h2{font-size:16px;margin-bottom:10px}.kpi{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed #2c3240;font-size:14px}
.kpi b{font-size:16px}.kpi.money b{color:#51cf66}.kpi.exp b{color:#ffd43b}.note{color:#778;font-size:11px;margin-top:8px}
.foot{color:#667;font-size:11px;text-align:center;margin-top:10px}
</style></head><body>
<h1>💼 受託KPI ダッシュボード</h1>
<div class="sub">更新 2026-06-19 09:00（毎日自動更新）</div>
<div class="total">
  <div>確定売上<b class="c">¥0</b></div>
  <div>見込み売上<b class="e">¥305,000</b></div>
</div>
<div class="plat">
      <h2>🟦 クラウドワークス</h2>
      <div class="kpi"><span>検知/出品</span><b>169</b></div>
      <div class="kpi"><span>応募</span><b>18</b></div>
      <div class="kpi"><span>受注中</span><b>0</b></div>
      <div class="kpi"><span>完了</span><b>0</b></div>
      <div class="kpi money"><span>確定売上</span><b>¥0</b></div>
      <div class="kpi exp"><span>見込み売上</span><b>¥305,000</b></div>
      <div class="note">得意案件を検知中。提案→受注で応募/受注中/売上が動く</div>
    </div>
<div class="plat">
      <h2>🟧 ココナラ</h2>
      <div class="kpi"><span>検知/出品</span><b>1公開+1下書き</b></div>
      <div class="kpi"><span>応募</span><b>0</b></div>
      <div class="kpi"><span>受注中</span><b>0</b></div>
      <div class="kpi"><span>完了</span><b>0</b></div>
      <div class="kpi money"><span>確定売上</span><b>¥0</b></div>
      <div class="kpi exp"><span>見込み売上</span><b>¥0</b></div>
      <div class="note">出品公開後に受注・売上が反映</div>
    </div>
<div class="foot">確定売上=完了して入金確定 / 見込み売上=応募中・受注中の期待額。<br>取引が動くと自動で数字が入ります。</div>
</body></html>
