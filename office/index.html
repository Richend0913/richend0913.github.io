<title>BURNING BROS. バーチャル事務所</title>
<style>
:root{
  --floor:#e9e2d4; --floor2:#e2d9c6; --wall:#cdbfa6; --ink:#3a3326;
  --pres:#f6c945; --work:#37b24d; --rest:#adb5bd; --move:#4dabf7;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Maru Gothic ProN','Yu Gothic UI',sans-serif;background:#2b2620;color:var(--ink);
  display:flex;flex-direction:column;align-items:center;min-height:100vh;}
.topbar{width:100%;max-width:1160px;display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;color:#fff;}
.topbar .brand{font-size:20px;font-weight:800;letter-spacing:.04em;}
.topbar .brand small{font-weight:400;opacity:.7;font-size:12px;margin-left:8px;}
.topbar .clock{font-size:14px;font-weight:700;background:rgba(255,255,255,.12);padding:6px 14px;border-radius:999px;}
.legend{display:flex;gap:16px;font-size:12px;color:#fff;opacity:.9;margin-bottom:8px;}
.legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle;}

.floor{position:relative;width:1120px;height:760px;background:
  repeating-linear-gradient(0deg,var(--floor),var(--floor) 39px,var(--floor2) 39px,var(--floor2) 40px),
  repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,0,0,.03) 39px,rgba(0,0,0,.03) 40px);
  border:8px solid var(--wall);border-radius:14px;box-shadow:0 18px 50px rgba(0,0,0,.5);overflow:hidden;}

.room{position:absolute;border:3px solid var(--wall);border-radius:12px;background:rgba(255,255,255,.55);
  box-shadow:inset 0 0 0 3px rgba(255,255,255,.5);}
.room .tab{position:absolute;top:-15px;left:14px;background:var(--wall);color:#fff;font-size:12.5px;font-weight:800;
  padding:3px 12px;border-radius:8px;white-space:nowrap;box-shadow:0 2px 0 rgba(0,0,0,.15);}
.room .tab .ic{margin-right:4px;}
.room.pres{background:rgba(246,201,69,.28);border-color:#d9a400;}
.room.pres .tab{background:#d9a400;}
.room.rest{background:rgba(173,181,189,.25);}

/* キャラ */
.char{position:absolute;width:54px;transition:left 1.6s ease-in-out,top 1.6s ease-in-out;z-index:10;cursor:default;}
.char .badge{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:800;
  padding:1px 7px;border-radius:999px;color:#fff;white-space:nowrap;box-shadow:0 2px 4px rgba(0,0,0,.2);}
.char .av{position:relative;width:54px;height:54px;animation:bob 2.4s ease-in-out infinite;}
.char.moving .av{animation:walk .4s linear infinite;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
@keyframes walk{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-2px) rotate(3deg);}}
.av .body{position:absolute;left:9px;top:20px;width:36px;height:30px;border-radius:16px 16px 12px 12px;}
.av .head{position:absolute;left:13px;top:2px;width:28px;height:28px;border-radius:50%;background:#ffe0bd;
  border:2px solid rgba(0,0,0,.12);}
.av .head:before,.av .head:after{content:"";position:absolute;top:11px;width:4px;height:5px;border-radius:50%;background:#3a3326;}
.av .head:before{left:7px;} .av .head:after{right:7px;}
.av .mouth{position:absolute;left:50%;top:18px;transform:translateX(-50%);width:9px;height:5px;
  border-bottom:2px solid #3a3326;border-radius:0 0 9px 9px;}
.av .hair{position:absolute;left:11px;top:-1px;width:32px;height:14px;border-radius:16px 16px 0 0;}
.av .crown{position:absolute;left:50%;top:-9px;transform:translateX(-50%);font-size:16px;}
.name{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:800;
  background:#fff;padding:1px 7px;border-radius:6px;box-shadow:0 1px 3px rgba(0,0,0,.2);white-space:nowrap;}
.name b{color:#9a7b1e;}
.role{position:absolute;bottom:-31px;left:50%;transform:translateX(-50%);font-size:8.5px;font-weight:700;
  color:#6a5d3e;background:rgba(255,255,255,.72);padding:0 4px;border-radius:5px;white-space:nowrap;max-width:120px;
  overflow:hidden;text-overflow:ellipsis;}

.bubble{position:absolute;bottom:62px;left:50%;transform:translateX(-50%);background:#fff;color:#3a3326;
  font-size:11.5px;font-weight:700;padding:6px 11px;border-radius:12px;box-shadow:0 4px 14px rgba(0,0,0,.25);
  white-space:nowrap;z-index:30;animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
.bubble:after{content:"";position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
  border:7px solid transparent;border-top-color:#fff;border-bottom:0;}
@keyframes pop{from{transform:translateX(-50%) scale(0);opacity:0;}to{transform:translateX(-50%) scale(1);opacity:1;}}
.tasklist{position:absolute;top:16px;left:10px;right:10px;}
.task{display:flex;align-items:center;gap:5px;font-size:10px;line-height:1.7;color:#5b5237;}
.task .tt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.task small{margin-left:auto;color:#9a8f72;font-size:9px;flex:none;}
.task .dot{width:7px;height:7px;border-radius:50%;flex:none;}
.task.done .dot{background:var(--work);} .task.done .tt{color:#9a9078;text-decoration:line-through;}
.task.work .dot{background:var(--move);box-shadow:0 0 0 3px rgba(77,171,247,.18);}
.task.todo .dot{background:#c7b9a0;}
.deskpc{position:absolute;font-size:15px;opacity:.6;}
.foot{color:#fff;opacity:.6;font-size:11px;margin:10px 0 24px;}
</style>

  {id:"c12",room:"okurite", name:"ひかり", role:"調査", body:"#4dabf7", hair:"#3a3326", status:"work", task:"ニーズ/季節トレンド調査", pool:["検索ニーズ調査","季節イベント整理","競合チェック"]},

  {id:"c8", room:"okurite", name:"りん",   role:"執筆", body:"#e64980", hair:"#7a4a2e", status:"work", task:"執筆・商品/デザイン調整", pool:["記事執筆","商品/デザイン調整","内部リンク"]},

  // ── ポータル室(richend0913.github.io 総合窓口) ──
  {id:"c31",room:"portal",  name:"みお",   role:"デザイン", body:"#7048e8", hair:"#3a3326", status:"work", task:"ポータルUI/デザイン整備", pool:["デザイン刷新","季節バナー更新","不要要素の整理"]},

const SCOL={work:"var(--work)",rest:"var(--rest)",move:"var(--move)"};
const SLBL={work:"🟢稼働",rest:"💤休憩",move:"🚶移動"};

const floor=document.getElementById("floor");
// 部屋描画
for(const k in ROOMS){const r=ROOMS[k];const d=document.createElement("div");
  d.className="room "+(r.cls||"");d.style.cssText=`left:${r.x}px;top:${r.y}px;width:${r.w}px;height:${r.h}px;`;
  d.innerHTML=`<div class="tab"><span class="ic">${r.ic}</span>${r.name}</div>`;
  floor.appendChild(d);}

// 部屋内の定位置(複数キャラを横に並べる)
function homePos(roomId){
  const r=ROOMS[roomId];const peers=CHARS.filter(c=>c.home===roomId);
  return peers;
}
CHARS.forEach(c=>c.home=c.room);
function slotXY(c){
  const r=ROOMS[c.home];const peers=CHARS.filter(x=>x.home===c.home);
  const i=peers.indexOf(c);const n=peers.length;
  const perRow=Math.min(n,3);const rows=Math.ceil(n/perRow);
  const row=Math.floor(i/perRow);const col=i%perRow;
  const inRow=(row===rows-1)?(n-perRow*row):perRow;          // 最終行は人数に合わせて中央寄せ
  const gap=r.w/(inRow+1);
  const x=r.x+gap*(col+1)-27;
  const rowH=Math.min(96,(r.h-58)/rows);
  const y=r.y+46+row*rowH;
  return {x, y};
}

// キャラ描画
const el={};
CHARS.forEach(c=>{
  const d=document.createElement("div");d.className="char";d.id="ch_"+c.id;
  d.innerHTML=`<div class="badge" id="bd_${c.id}"></div>
    <div class="av"><div class="hair" style="background:${c.hair}"></div>
      <div class="head"><div class="mouth"></div></div>
      ${c.crown?`<div class="crown">${c.crown}</div>`:""}
      <div class="body" style="background:${c.body}"></div></div>
    <div class="name">${c.name.includes("社長")?`<b>${c.name}</b>`:c.name}</div>
    <div class="role" id="rl_${c.id}">▶ ${c.task||c.role}</div>`;
  floor.appendChild(d);el[c.id]=d;
  const p=slotXY(c);d.style.left=p.x+"px";d.style.top=p.y+"px";
  updateBadge(c);
});
function updateBadge(c){const b=document.getElementById("bd_"+c.id);
  b.textContent=SLBL[c.status];b.style.background=SCOL[c.status];}
function moveTo(c,x,y){el[c.id].style.left=x+"px";el[c.id].style.top=y+"px";}
function bubble(c,text){const d=el[c.id];const b=document.createElement("div");b.className="bubble";b.textContent=text;
  d.appendChild(b);setTimeout(()=>b.remove(),2600);}

// ───── シミュレーション(24h稼働: 各自がタスク実行→完了ごとに社長へ報告) ─────
const REPLIES=["ナイス、次いこう","了解、助かる！","OK、進めて","いいね、その調子","よし、報告ありがと"];
const taskIdx={}; CHARS.forEach(c=>{taskIdx[c.id]=0;});
const workers=CHARS.filter(c=>c.id!=="pres");
let wq=0;
function setTaskLabel(c){const rl=document.getElementById("rl_"+c.id); if(rl) rl.textContent="▶ "+(c.task||c.role);}
function advanceTask(c){
  if(!c.pool||!c.pool.length) return;
  taskIdx[c.id]=(taskIdx[c.id]+1)%c.pool.length; c.task=c.pool[taskIdx[c.id]]; setTaskLabel(c);
}
// 1人が今のタスクを完了→社長室へ歩いて報告→戻って次タスク着手
function completeAndReport(){
  let c=null;
  for(let k=0;k<workers.length;k++){const cand=workers[(wq+k)%workers.length];
    if(cand && cand.status==="work"){c=cand; wq=(wq+k+1)%workers.length; break;}}
  if(!c) return;
  const done=c.task, pres=CHARS.find(x=>x.id==="pres"), back=slotXY(c), tr=ROOMS["pres"];
  c.status="move"; updateBadge(c); el[c.id].classList.add("moving");
  moveTo(c, tr.x+tr.w/2-27, tr.y+tr.h-42);
  setTimeout(()=>bubble(c,`「${done}」完了！`),1500);
  setTimeout(()=>bubble(pres,REPLIES[wq%REPLIES.length]),2700);
  setTimeout(()=>moveTo(c,back.x,back.y),3800);
  setTimeout(()=>{c.status="work";updateBadge(c);el[c.id].classList.remove("moving");advanceTask(c);},5400);
}
// 朝礼: 今日のタスクを配分
function morning(){
  const pres=CHARS.find(x=>x.id==="pres");
  bubble(pres,"おはよう！今日のタスク配分完了。各室よろしく");
  workers.forEach((c,i)=>{ if(c.status!=="move") setTimeout(()=>{ if(c.status!=="move") bubble(c,"今日のタスク開始"); },400+i*110); });
}
// ───── 実稼働連動: state.json をポーリング(HTTPで配信時)。file://直開きはデモ ─────
let LIVE=false, lastEventTs="", seededEvents=false;
function applyState(s){
  if(!s||!s.chars) return;
  if(Object.keys(s.chars).length>0) LIVE=true;
  for(const id in s.chars){
    const c=CHARS.find(x=>x.id===id); if(!c) continue;
    if(s.chars[id].status && c.status!=="move"){ c.status=s.chars[id].status; updateBadge(c); }
  }
  const evs=s.events||[];
  if(!seededEvents){ if(evs.length) lastEventTs=evs[evs.length-1].ts; seededEvents=true; return; } // 起動時は過去イベントを再生しない
  for(const e of evs){ if(e.ts>lastEventTs) triggerWalk(e.from,e.to,e.msg); }
  if(evs.length) lastEventTs=evs[evs.length-1].ts;
}
function triggerWalk(fromId,toId,msg){
  const a=CHARS.find(c=>c.id===fromId), b=CHARS.find(c=>c.id===toId);
  if(!a||!b||a.status==="move") return;
  const back=slotXY(a); a.status="move"; updateBadge(a); el[a.id].classList.add("moving");
  const tr=ROOMS[b.home]; moveTo(a, tr.x+tr.w/2-27, tr.y+tr.h-46);
  setTimeout(()=>bubble(a,msg||"報連相です"),1500);
  setTimeout(()=>bubble(b,"了解！"),2700);
  setTimeout(()=>moveTo(a,back.x,back.y),3800);
  setTimeout(()=>{a.status="work";updateBadge(a);el[a.id].classList.remove("moving");},5400);
}
async function pollState(){
  try{ const r=await fetch('state.json?_='+Date.now()); if(r.ok) applyState(await r.json()); }catch(e){}
}
setInterval(pollState,4000); pollState();
// 本番(state.jsonに実データあり)では実稼働だけを表示。嘘の報連相/タスク開始は出さない。
// 実データが無い時(file://のローカルプレビュー等)だけ、デモで賑やかに動かす。
setTimeout(()=>{
  if(LIVE) return;                       // 実データ検出→デモは一切動かさない
  setInterval(()=>{ if(!LIVE) completeAndReport(); },3500);
  setInterval(()=>{ if(!LIVE) morning(); },60000);
  if(!LIVE) morning();
}, 5000);

// 時計
function tick(){const n=new Date();
  document.getElementById("clock").textContent=
    String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");}
tick();setInterval(tick,10000);

// スマホ対応: フロアを画面幅に合わせて縮小(zoomは層レイアウトも追従)
function fitFloor(){
  const f=document.getElementById("floor"); if(!f) return;
  const z=Math.min(1,(window.innerWidth-12)/1136);
  f.style.zoom=z; f.style.MozTransform="scale("+z+")"; f.style.MozTransformOrigin="top left";
}
fitFloor(); window.addEventListener("resize",fitFloor); window.addEventListener("orientationchange",fitFloor);
</script>
