<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BURNING BROS. バーチャル事務所</title>
<style>
  :root{--card:#efe7d6;--card2:#e6dcc6;--wall:#cdbfa6;--ink:#3a3326;--sub:#7a6f55;
    --work:#37b24d;--rest:#adb5bd;--move:#4dabf7;--gold:#e0a800;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:'Hiragino Maru Gothic ProN','Yu Gothic UI',sans-serif;background:#1c150d;color:#f3ece0;
    display:flex;flex-direction:column;overflow:hidden;}
  .top{flex:none;padding:7px 12px 5px;}
  .top h1{font-size:13.5px;font-weight:800;}
  .top h1 .clk{float:right;font-size:11px;font-weight:700;background:rgba(255,255,255,.13);padding:2px 9px;border-radius:999px;}
  .top .sub{font-size:9.5px;color:#b8a888;margin-top:2px;}
  .top .sub i{display:inline-block;width:7px;height:7px;border-radius:50%;margin:0 3px 0 8px;vertical-align:middle;}
  .grid{flex:1;min-height:0;display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:1fr;
    gap:6px;padding:0 7px 6px;overflow:hidden;}
  .room{background:var(--card);border:1.5px solid var(--wall);border-radius:11px;
    padding:5px 6px 6px;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
  .room.pres{background:#f7eac0;border-color:var(--gold);}
  .room.mgmt{background:#e7e2ea;border-color:#9aa;}
  .rh{display:flex;align-items:center;gap:4px;margin-bottom:4px;}
  .rh .ic{font-size:12px;} .rh .nm{font-size:10.5px;font-weight:800;color:var(--ink);line-height:1;}
  .chars{flex:1;display:flex;flex-wrap:wrap;gap:6px 3px;justify-content:center;align-content:center;}
  .ch{width:31px;text-align:center;position:relative;}
  .av{width:26px;height:26px;margin:0 auto;position:relative;animation:bob 2.8s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.5px)}}
  .av .body{position:absolute;left:4px;top:10px;width:18px;height:15px;border-radius:8px 8px 6px 6px;}
  .av .head{position:absolute;left:6px;top:1px;width:14px;height:14px;border-radius:50%;background:#ffe0bd;border:1.5px solid rgba(0,0,0,.12);}
  .av .head:before,.av .head:after{content:"";position:absolute;top:6px;width:2px;height:2.5px;border-radius:50%;background:#3a3326;}
  .av .head:before{left:3px;} .av .head:after{right:3px;}
  .av .hair{position:absolute;left:5px;top:0;width:16px;height:7px;border-radius:8px 8px 0 0;}
  .av .crown{position:absolute;left:50%;top:-6px;transform:translateX(-50%);font-size:9px;}
  .dot{position:absolute;right:1px;top:-1px;width:8px;height:8px;border-radius:50%;border:1.5px solid var(--card);}
  .ch .n{font-size:7.5px;font-weight:700;color:var(--ink);line-height:1.15;margin-top:1px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .foot{flex:none;text-align:center;color:#8a7a55;font-size:9.5px;padding:3px 8px 5px;}
  .foot a{color:#9ec5ff;}
</style>
</head>
<body>
  <div class="top">
    <h1>🏢 BURNING BROS. 事務所<span class="clk" id="clk">--:--</span></h1>
    <div class="sub"><i style="background:var(--work)"></i>稼働<i style="background:var(--rest)"></i>休憩<i style="background:var(--move)"></i>報連相<span id="upd" style="float:right"></span></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="foot">実データ毎時更新・30秒ごと自動更新 ／ <a href="list.html">📋 文字で詳しく</a></div>
<script>
const ROOMS=[
  ["okurite","Okurite室","🎁",""],["video","動画室","🎬",""],
  ["mgmt","管理部","🛡️","mgmt"],["pres","社長室","👑","pres"],
  ["trade","トレード室","📈",""],["lab","研究室","🔬",""],
  ["recruit","求人室","🚚",""],["invoice","インボイス室","🧾",""],
  ["portal","ポータル室","🌐",""],["manabi","まなびじま室","🐻",""],
];
const C=[
 ["pres","pres","クマ社長","#3a3326","#5b4a2e","👑"],
 ["c31","portal","みお","#7048e8","#3a3326"],["c32","portal","れん","#1098ad","#3a3326"],
 ["c33","mgmt","ケン","#868e96","#3a3326"],["c34","mgmt","ナミ","#e8a0bf","#5b3a2e"],["c35","mgmt","ソウ","#9775fa","#3a3326"],
 ["c12","okurite","ひかり","#4dabf7","#3a3326"],["c13","okurite","だいき","#fab005","#3a3326"],["c8","okurite","りん","#e64980","#7a4a2e"],["c14","okurite","ともみ","#15aabf","#5b3a2e"],["c15","okurite","しょう","#e8590c","#3a3326"],
 ["c3","video","ゆい","#ff8fb1","#7a4a2e"],["c4","video","けんた","#ff9f1c","#3a3326"],["c18","video","あおい","#845ef7","#3a3326"],["c19","video","りょう","#20c997","#3a3326"],["c20","video","みなと","#f6c945","#5b4a2e"],
 ["c1","trade","さとし","#4dabf7","#3a3326"],["c2","trade","みさき","#9b5de5","#5b3a8a"],["c16","trade","りく","#f783ac","#5b3a2e"],["c17","trade","かな","#3bc9db","#3a3326"],
 ["c7","recruit","なお","#20c997","#3a3326"],["c23","recruit","たけし","#228be6","#3a3326"],["c24","recruit","ほのか","#faa2c1","#7a4a2e"],["c25","recruit","じん","#82c91e","#3a3326"],
 ["c10","lab","けいすけ","#228be6","#3a3326"],["c11","lab","まり","#12b886","#5b3a2e"],["c26","lab","はるか","#15aabf","#3a3326"],["c27","lab","ごう","#5c7cfa","#3a3326"],
 ["c5","invoice","たくみ","#37b24d","#3a3326"],["c6","invoice","あや","#f6c945","#5b4a2e"],["c21","invoice","ゆうと","#4dabf7","#3a3326"],["c22","invoice","さき","#ff922b","#7a4a2e"],
 ["c9","manabi","そうた","#ff6b6b","#3a3326"],["c28","manabi","ことり","#f06595","#7a4a2e"],["c29","manabi","はやと","#fcc419","#3a3326"],["c30","manabi","めい","#38d9a9","#5b3a2e"],
];
const SC={work:"var(--work)",rest:"var(--rest)",move:"var(--move)"};
function ago(ts){if(!ts)return"";const d=(Date.now()-new Date(ts).getTime())/1000;
  if(d<90)return"今";if(d<3600)return Math.floor(d/60)+"分前";if(d<86400)return Math.floor(d/3600)+"時間前";return Math.floor(d/86400)+"日前";}
let STATE={chars:{}};
function av(c){return `<div class="av"><div class="hair" style="background:${c[4]}"></div>
  <div class="head"></div>${c[5]?`<div class="crown">${c[5]}</div>`:""}
  <div class="body" style="background:${c[3]}"></div></div>`;}
function render(){
  let html="";
  for(const [rid,rname,ic,cls] of ROOMS){
    const members=C.filter(c=>c[1]===rid);
    let cells="";
    for(const c of members){
      const st=STATE.chars[c[0]]||{}; const status=st.status||"work";
      cells+=`<div class="ch" title="${(st.msg||'').replace(/"/g,'')}">${av(c)}
        <span class="dot" style="background:${SC[status]||SC.work}"></span>
        <div class="n">${c[2].replace('クマ社長','社長')}</div></div>`;
    }
    html+=`<div class="room ${cls}"><div class="rh"><span class="ic">${ic}</span><span class="nm">${rname}</span></div>
      <div class="chars">${cells}</div></div>`;
  }
  document.getElementById("grid").innerHTML=html;
}
async function poll(){
  try{const s=await(await fetch("state.json?_="+Date.now())).json();
    STATE=s||{chars:{}}; document.getElementById("upd").textContent="更新 "+ago(s.updated);
  }catch(e){}
  render();
}
function tick(){const n=new Date();document.getElementById("clk").textContent=
  String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");}
tick();setInterval(tick,10000);
poll();setInterval(poll,30000);
</script>
</body>
</html>
