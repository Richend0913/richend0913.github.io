<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BURNING BROS. 事務所 稼働状況</title>
<style>
  :root{--bg:#15110c;--card:#221b13;--line:#3a2f22;--ink:#f3ece0;--sub:#b8a888;
    --work:#37d058;--rest:#9a8f72;--move:#4dabf7;--gold:#f6c945;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Hiragino Maru Gothic ProN','Yu Gothic UI',sans-serif;background:var(--bg);color:var(--ink);
    line-height:1.6;padding:0 0 40px;}
  .top{position:sticky;top:0;background:linear-gradient(180deg,#1c150e,#15110c);padding:16px 16px 12px;
    border-bottom:1px solid var(--line);z-index:5;}
  .top h1{font-size:17px;font-weight:800;letter-spacing:.02em;}
  .top .meta{font-size:11px;color:var(--sub);margin-top:3px;}
  .top .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--work);margin-right:5px;
    animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .wrap{max-width:560px;margin:0 auto;padding:14px 12px;}
  .sec{margin-bottom:22px;}
  .sec-t{font-size:12px;font-weight:800;color:var(--gold);letter-spacing:.08em;margin:0 4px 10px;text-transform:uppercase;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:8px;
    display:flex;align-items:flex-start;gap:11px;}
  .ava{width:34px;height:34px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
    font-size:15px;background:#2e2519;border:1px solid var(--line);}
  .who{flex:1;min-width:0;}
  .who .n{font-size:14px;font-weight:700;}
  .who .n small{font-weight:400;color:var(--sub);font-size:11px;margin-left:6px;}
  .who .m{font-size:12.5px;color:var(--sub);margin-top:2px;word-break:break-word;}
  .badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;flex:none;color:#15110c;}
  .b-work{background:var(--work);} .b-rest{background:var(--rest);} .b-move{background:var(--move);}
  .ev{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 13px;margin-bottom:7px;}
  .ev .h{font-size:12px;font-weight:700;color:var(--gold);}
  .ev .h .t{float:right;font-weight:400;color:var(--sub);font-size:10.5px;}
  .ev .b{font-size:13px;margin-top:3px;word-break:break-word;}
  pre.log{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 13px;
    font-size:12px;color:var(--sub);white-space:pre-wrap;word-break:break-word;line-height:1.7;
    font-family:inherit;}
  .empty{color:var(--sub);font-size:12.5px;padding:8px 4px;}
  .foot{text-align:center;color:#6a5d44;font-size:11px;margin-top:24px;}
</style>
</head>
<body>
  <div class="top">
    <h1>🏢 BURNING BROS. 事務所</h1>
    <div class="meta"><span class="dot"></span><span id="upd">読み込み中…</span> ・ 30秒ごとに自動更新</div>
  </div>
  <div class="wrap">
    <div class="sec">
      <div class="sec-t">🟢 いま稼働中</div>
      <div id="working"></div>
    </div>
    <div class="sec">
      <div class="sec-t">📢 最近の報連相</div>
      <div id="events"></div>
    </div>
    <div class="sec">
      <div class="sec-t">📋 今日の稼働ログ</div>
      <pre class="log" id="report">—</pre>
    </div>
    <div class="foot">CEO=クマ社長(AI) ／ 自動稼働中 🐻🔥</div>
  </div>
<script>
// エージェントid → 名前・部屋・絵文字
const C = {
  pres:["クマ社長","社長室","👑"],
  c1:["さとし","トレード室","📈"],c2:["みさき","トレード室","📈"],c16:["りく","トレード室","📈"],c17:["かな","トレード室","📈"],
  c3:["ゆい","動画室","🎬"],c4:["けんた","動画室","🎬"],c18:["あおい","動画室","🎬"],c19:["りょう","動画室","🎬"],c20:["みなと","動画室","🎬"],
  c5:["たくみ","インボイス室","🧾"],c6:["あや","インボイス室","🧾"],c21:["ゆうと","インボイス室","🧾"],c22:["さき","インボイス室","🧾"],
  c7:["なお","求人室","🚚"],c23:["たけし","求人室","🚚"],c24:["ほのか","求人室","🚚"],c25:["じん","求人室","🚚"],
  c10:["けいすけ","研究室","🔬"],c11:["まり","研究室","🔬"],c26:["はるか","研究室","🔬"],c27:["ごう","研究室","🔬"],
  c12:["ひかり","Okurite室","🎁"],c13:["だいき","Okurite室","🎁"],c8:["りん","Okurite室","🎁"],c14:["ともみ","Okurite室","🎁"],c15:["しょう","Okurite室","🎁"],
  c9:["そうた","まなびじま室","🐻"],c28:["ことり","まなびじま室","🐻"],c29:["はやと","まなびじま室","🐻"],c30:["めい","まなびじま室","🐻"],
  c31:["みお","ポータル室","🌐"],c32:["れん","ポータル室","🌐"],
  c33:["ケン","管理部","🛡️"],c34:["ナミ","管理部","🛡️"],c35:["ソウ","管理部","🛡️"],
};
const SB={work:"b-work",rest:"b-rest",move:"b-move"}, SL={work:"稼働",rest:"休憩",move:"報連相"};
function ago(ts){ if(!ts) return ""; const d=(Date.now()-new Date(ts).getTime())/1000;
  if(d<60) return "たった今"; if(d<3600) return Math.floor(d/60)+"分前"; if(d<86400) return Math.floor(d/3600)+"時間前"; return Math.floor(d/86400)+"日前"; }
async function load(){
  try{
    const s=await (await fetch("state.json?_="+Date.now())).json();
    document.getElementById("upd").textContent="更新 "+ago(s.updated);
    // 稼働中
    const chars=s.chars||{}; let w="";
    const order=Object.entries(chars).sort((a,b)=> (b[1].ts||"").localeCompare(a[1].ts||""));
    for(const [id,v] of order){
      const c=C[id]; if(!c) continue;
      const doneLine = v.done ? `<div class="m" style="color:#6a7a5a;font-size:11px">✓ 前回: ${(v.done||"").replace(/</g,"&lt;")}</div>` : "";
      w+=`<div class="card"><div class="ava">${c[2]}</div>
        <div class="who"><div class="n">${c[0]} <small>${c[1]}・${c[2]==='👑'?'CEO':c[1]}</small></div>
        ${doneLine}
        <div class="m">▶ 今: ${(v.msg||"").replace(/</g,"&lt;")} <span style="color:#6a5d44">・${ago(v.ts)}</span></div></div>
        <span class="badge ${SB[v.status]||'b-rest'}">${SL[v.status]||"待機"}</span></div>`;
    }
    document.getElementById("working").innerHTML=w||'<div class="empty">データ待ち…(毎時更新)</div>';
    // 報連相イベント
    const evs=(s.events||[]).slice(-12).reverse(); let e="";
    for(const ev of evs){ const f=C[ev.from], t=C[ev.to];
      e+=`<div class="ev"><div class="h">${f?f[0]:ev.from} → ${t?t[0]:ev.to}<span class="t">${ago(ev.ts)}</span></div>
        <div class="b">${(ev.msg||"").replace(/</g,"&lt;")}</div></div>`; }
    document.getElementById("events").innerHTML=e||'<div class="empty">まだ報連相なし</div>';
  }catch(err){ document.getElementById("upd").textContent="読み込み失敗(再試行中)"; }
  // 日報
  try{ const r=await (await fetch("daily_report.md?_="+Date.now())).text();
    document.getElementById("report").textContent=r; }catch(e){}
}
load(); setInterval(load,30000);
</script>
</body>
</html>
